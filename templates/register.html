{% extends "base.html" %}

{% block title %}Регистрация - GoldForum{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card border-gold">
            <div class="card-header bg-black border-gold">
                <h3 class="text-gold mb-0 text-center">📝 Регистрация</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-gold">Имя пользователя</label>
                        <input type="text"
                               class="form-control bg-dark text-white border-secondary"
                               id="username"
                               name="username"
                               placeholder="Придумайте логин"
                               minlength="3"
                               required>
                        <small class="text-muted">Минимум 3 символа</small>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-gold">Пароль</label>
                        <input type="password"
                               class="form-control bg-dark text-white border-secondary"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               minlength="6"
                               required>
                        <small class="text-muted">Минимум 6 символов</small>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Зарегистрироваться
                    </button>
                </form>

                <hr class="border-secondary">

                <p class="text-center mb-0">
                    Уже есть аккаунт?
                    <a href="{{ url_for('login') }}" class="text-gold">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
